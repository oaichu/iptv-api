name: 'Update schedule'

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Set branch name
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Debug - Show config
        run: |
          echo "========== config/config.ini =========="
          cat config/config.ini 2>/dev/null || echo "FILE NOT FOUND"
          echo ""
          echo "========== config/subscribe.txt =========="
          cat config/subscribe.txt 2>/dev/null || echo "FILE NOT FOUND"
          echo ""
          echo "========== user_demo.txt - Tổng số nhóm =========="
          grep '#genre#' config/user_demo.txt 2>/dev/null | wc -l || echo "0"
          echo ""
          echo "========== user_demo.txt - Tổng số tên kênh =========="
          grep -v '^[[:space:]]*$' config/user_demo.txt 2>/dev/null | grep -v '#genre#' | grep -v '^\[' | wc -l || echo "0"

      - name: Update IPTV playlist
        run: pipenv run dev

      - name: Debug - Check output files
        run: |
          echo "========== Output files =========="
          find output -type f 2>/dev/null || echo "No output directory"
          echo ""
          if [ -f output/user_result.m3u ]; then
            echo "user_result.m3u exists"
            echo "File size: $(wc -c < output/user_result.m3u) bytes"
            echo "Total EXTINF lines: $(grep -c '^#EXTINF' output/user_result.m3u)"
          else
            echo "user_result.m3u NOT FOUND"
          fi

      - name: Post-process M3U
        run: |
          if [ ! -f output/user_result.m3u ]; then
            echo "LỖI: Không tìm thấy output/user_result.m3u"
            exit 1
          fi

          sed -i 's/\$订阅源//g' output/user_result.m3u
          sed -i 's/未匹配频道/Kênh Chưa Phân Loại/g' output/user_result.m3u
          sed -i 's/无结果频道/Kênh Lỗi - Không Chạy/g' output/user_result.m3u
          sed -i 's/更新时间/Thời Gian Cập Nhật/g' output/user_result.m3u

          python3 <<'PY'
          from pathlib import Path
          from collections import Counter
          import re

          path = Path("output/user_result.m3u")
          text = path.read_text(encoding="utf-8", errors="ignore")
          lines = text.splitlines()

          seen = set()
          output = []
          i = 0
          while i < len(lines):
              line = lines[i]
              if line.startswith("#EXTINF"):
                  match = re.search(r',\s*(.+)$', line)
                  channel_name = match.group(1).strip().lower() if match else ""

                  if i + 1 < len(lines) and not lines[i + 1].startswith("#"):
                      url_line = lines[i + 1]
                      if channel_name not in seen and channel_name != "":
                          seen.add(channel_name)
                          output.append(line)
                          output.append(url_line)
                      i += 2
                      continue
              output.append(line)
              i += 1

          path.write_text("\n".join(output) + "\n", encoding="utf-8")

          total = sum(1 for l in output if l.startswith("#EXTINF"))
          print(f"\n{'='*50}")
          print(f"TỔNG SỐ KÊNH (sau loại trùng): {total}")
          print(f"{'='*50}")
          print(f"\nPHÂN BỔ THEO NHÓM:")

          groups_list = []
          for l in output:
              if l.startswith("#EXTINF"):
                  m = re.search(r'group-title="([^"]*)"', l)
                  if m:
                      groups_list.append(m.group(1))
          for g, c in sorted(Counter(groups_list).items()):
              print(f"  {c:>4}  {g}")
          print(f"\n{'='*50}")
          PY

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Auto Updated IPTV Playlist (verified)"
            git push --force
          fi
          
