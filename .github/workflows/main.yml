                          base = re.sub(r'group-title="[^"]*"', f'group-title="{grp}"', base)
                      else:
                          base = base.replace("#EXTINF:-1", f'#EXTINF:-1 group-title code xử lý Python này sẽ sàng lọc cực mạnh. Để bộ lọc có đủ "nguyên liệu" dồi dào, ông nhớ kiểm tra file `config/config="{grp}"', 1)
                      
