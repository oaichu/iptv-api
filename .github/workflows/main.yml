name: 'Update schedule'

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Set branch name
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Show config info
        run: |
          echo "===== config/config.ini ====="
          cat config/config.ini || true
          echo ""
          echo "===== subscribe.txt ====="
          cat config/subscribe.txt || true
          echo ""
          echo "===== Tổng số kênh trong user_demo.txt ====="
          grep -v '^[[:space:]]*$' config/user_demo.txt | grep -v '#genre#' | wc -l || true

      - name: Update IPTV playlist
        run: pipenv run dev

      - name: Post-process M3U (Dịch tiếng Trung còn sót)
        run: |
          if [ ! -f output/user_result.m3u ]; then
            echo "Không tìm thấy output/user_result.m3u"
            find output -maxdepth 3 -type f || true
            exit 1
          fi

          sed -i 's/\$订阅源//g' output/user_result.m3u
          sed -i 's/未匹配频道/Kênh Chưa Phân Loại/g' output/user_result.m3u
          sed -i 's/无结果频道/Kênh Lỗi - Không Chạy/g' output/user_result.m3u
          sed -i 's/更新时间/Thời Gian Cập Nhật/g' output/user_result.m3u

          echo ""
          echo "===== KẾT QUẢ ====="
          echo "Tổng số kênh trong M3U:"
          grep -c '^#EXTINF' output/user_result.m3u || true
          echo ""
          echo "Phân bổ theo nhóm:"
          grep '^#EXTINF' output/user_result.m3u | sed -n 's/.*group-title="\([^"]*\)".*/\1/p' | sort | uniq -c | sort -rn || true

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Auto Updated IPTV Playlist"
            git push --force
          fi
          
