name: 'Update schedule'

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Set branch name
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Update IPTV playlist
        run: pipenv run dev

      - name: Clean, translate and regroup channels (FIXED ORDER)
        run: |
          if [ ! -f output/user_result.m3u ]; then
            echo "Không tìm thấy output/user_result.m3u"
            find output -maxdepth 3 -type f || true
            exit 1
          fi

          sed -i 's/\$订阅源//g' output/user_result.m3u
          sed -i 's/未匹配频道/Kênh Chưa Phân Loại/g' output/user_result.m3u
          sed -i 's/无结果频道/Kênh Lỗi - Không Chạy/g' output/user_result.m3u
          sed -i 's/更新时间/Thời Gian Cập Nhật/g' output/user_result.m3u

          python3 <<'PY'
          import re
          from pathlib import Path

          path = Path("output/user_result.m3u")
          text = path.read_text(encoding="utf-8", errors="ignore")

          groups = [
              # === ƯU TIÊN CAO NHẤT: THỂ THAO QUỐC TẾ (kiểm tra trước để không bị các nhóm khác hớt) ===
              ("12. Thể Thao Quốc Tế", [
                  r"ESPN", r"Fox\s?Sports", r"Sky\s?Sports", r"beIN", r"bein",
                  r"Eurosport", r"DAZN", r"CBS\s?Sports", r"TNT\s?Sports",
                  r"BT\s?Sport", r"Premier\s?League", r"Champions\s?League",
                  r"NBA\s?TV", r"NFL\s?Network", r"MLB\s?Network", r"Golf\s?Channel",
                  r"WWE", r"UFC", r"Fight\s?Sports", r"SuperSport", r"Sport\s?TV\b"
              ]),

              # === THỂ THAO VIỆT NAM (sau quốc tế để không hớt ESPN/Sky) ===
              ("11. Thể Thao Việt Nam", [
                  r"Bóng Đá\s?TV", r"Bong\s?Da\s?TV", r"Thể Thao\s?TV", r"The\s?Thao\s?TV",
                  r"HTV\s?Thể\s?Thao", r"HTV\s?The\s?Thao", r"HTV\s?Sports",
                  r"ON\s?Sports\s?News", r"ON\s?Football", r"ON\s?Golf",
                  r"ON\s?Sports\b", r"K\+\s?Sport", r"K\+\s?Sports",
                  r"SCTV\s?Thể\s?Thao", r"SCTV\s?Sports",
                  r"VTV6", r"VTV\s?6\b"
              ]),

              # === VTV CAB (kiểm tra sớm để ON Sports/ON Movies không bị nhóm khác hớt) ===
              ("06. VTVcab - Truyền Hình Cáp Việt Nam", [
                  r"VTV\s?cab", r"VTVcab",
                  r"\bON\s?Sports\b", r"\bON\s?Football\b", r"\bON\s?Golf\b",
                  r"\bON\s?Movies\b", r"\bON\s?Music\b", r"\bON\s?Kids\b",
                  r"\bON\s?Vie\b", r"\bON\s?Cine\b", r"\bON\s?Trending\b",
                  r"\bON\s?E\s?Channel\b"
              ]),

              # === K PLUS (trước FPT và SCTV) ===
              ("09. K Plus", [
                  r"\bK\+\b", r"\bKPlus\b", r"K\+\s?Sport", r"K\+\s?Sports",
                  r"K\+\s?Cine", r"K\+\s?Life", r"K\+\s?Kids", r"K\+\s?Action"
              ]),

              # === SCTV ===
              ("07. SCTV", [
                  r"\bSCTV\s?\d+\b",
                  r"SCTV\s?Phim", r"SCTV\s?Thể\s?Thao", r"SCTV\s?The\s?Thao",
                  r"SCTV\s?Sports", r"SCTV\s?Ca\s?Nhạc", r"SCTV\s?Ca\s?Nhac",
                  r"SCTV\s?Thiếu\s?Nhi", r"SCTV\s?Thieu\s?Nhi"
              ]),

              # === FPT ===
              ("08. FPT Play - FPT TV", [
                  r"\bFPT\b", r"FPT\s?Play", r"FPT\s?TV"
              ]),

              # === HTV (sau thể thao, trước VTV) ===
              ("02. HTV - TP.HCM", [
                  r"\bHTV\s?1\b", r"\bHTV\s?2\b", r"\bHTV\s?3\b", r"\bHTV\s?4\b",
                  r"\bHTV\s?7\b", r"\bHTV\s?9\b", r"\bHTVC\b",
                  r"HTV\s?Key", r"HTV\s?Sports", r"HTV\s?Thể\s?Thao", r"HTV\s?The\s?Thao"
              ]),

              # === VTV (trừ VTV6 đã vào thể thao, VTV7 vào thiếu nhi) ===
              ("01. VTV - Kênh Quốc Gia", [
                  r"\bVTV\s?1\b", r"\bVTV\s?2\b", r"\bVTV\s?3\b", r"\bVTV\s?4\b",
                  r"\bVTV\s?5\b", r"\bVTV\s?8\b", r"\bVTV\s?9\b", r"\bVTV\s?10\b"
              ]),

              # === ĐỊA PHƯƠNG MIỀN BẮC ===
              ("03. Địa Phương - Miền Bắc", [
                  r"Hà\s?Nội", r"Ha\s?Noi", r"Hanoi",
                  r"Hải\s?Phòng", r"Hai\s?Phong", r"\bTHP\b",
                  r"Quảng\s?Ninh", r"Quang\s?Ninh", r"\bQTV\b",
                  r"Bắc\s?Ninh", r"Bac\s?Ninh", r"Bắc\s?Giang", r"Bac\s?Giang",
                  r"Hải\s?Dương", r"Hai\s?Duong", r"Hưng\s?Yên", r"Hung\s?Yen",
                  r"Thái\s?Bình", r"Thai\s?Binh", r"Nam\s?Định", r"Nam\s?Dinh",
                  r"Ninh\s?Bình", r"Ninh\s?Binh", r"Thanh\s?Hóa", r"Thanh\s?Hoa",
                  r"Nghệ\s?An", r"Nghe\s?An", r"\bNTV\b", r"Hà\s?Tĩnh", r"Ha\s?Tinh",
                  r"Tuyên\s?Quang", r"Tuyen\s?Quang", r"Lào\s?Cai", r"Lao\s?Cai",
                  r"Yên\s?Bái", r"Yen\s?Bai", r"Phú\s?Thọ", r"Phu\s?Tho",
                  r"Thái\s?Nguyên", r"Thai\s?Nguyen", r"Cao\s?Bằng", r"Cao\s?Bang",
                  r"Bắc\s?Kạn", r"Bac\s?Kan", r"Lạng\s?Sơn", r"Lang\s?Son",
                  r"Điện\s?Biên", r"Dien\s?Bien", r"Lai\s?Châu", r"Lai\s?Chau",
                  r"Sơn\s?La", r"Son\s?La", r"Hòa\s?Bình", r"Hoa\s?Binh"
              ]),

              # === ĐỊA PHƯƠNG MIỀN TRUNG ===
              ("04. Địa Phương - Miền Trung", [
                  r"Quảng\s?Bình", r"Quang\s?Binh", r"Quảng\s?Trị", r"Quang\s?Tri",
                  r"\bHuế\b", r"\bHue\b", r"\bTRT\b",
                  r"Đà\s?Nẵng", r"Da\s?Nang", r"\bDRT\b",
                  r"Quảng\s?Nam", r"Quang\s?Nam", r"\bQRT\b",
                  r"Quảng\s?Ngãi", r"Quang\s?Ngai", r"\bPTQ\b",
                  r"Bình\s?Định", r"Binh\s?Dinh", r"Phú\s?Yên", r"Phu\s?Yen",
                  r"Khánh\s?Hòa", r"Khanh\s?Hoa", r"\bKTV\b",
                  r"Ninh\s?Thuận", r"Ninh\s?Thuan", r"Bình\s?Thuận", r"Binh\s?Thuan",
                  r"Kon\s?Tum", r"Gia\s?Lai", r"\bTHGL\b",
                  r"Đắk\s?Lắk", r"Dak\s?Lak", r"Đắk\s?Nông", r"Dak\s?Nong",
                  r"Lâm\s?Đồng", r"Lam\s?Dong"
              ]),

              # === ĐỊA PHƯƠNG MIỀN NAM ===
              ("05. Địa Phương - Miền Nam", [
                  r"\bTHVL\b", r"\bTHĐT\b", r"\bTHDT\b", r"\bTHAG\b",
                  r"\bTHKG\b", r"\bTHLA\b", r"\bTHBT\b", r"\bTHTG\b",
                  r"\bTHTPCT\b", r"\bHGTV\b", r"\bSTV\b", r"\bBLTV\b", r"\bBPTV\b",
                  r"Bình\s?Dương", r"Binh\s?Duong", r"\bBTV\b",
                  r"Đồng\s?Nai", r"Dong\s?Nai", r"\bDNRTV\b",
                  r"Bà\s?Rịa", r"Ba\s?Ria", r"Vũng\s?Tàu", r"Vung\s?Tau", r"\bBRT\b",
                  r"Long\s?An", r"Tiền\s?Giang", r"Tien\s?Giang",
                  r"Bến\s?Tre", r"Ben\s?Tre", r"Trà\s?Vinh", r"Tra\s?Vinh",
                  r"Đồng\s?Tháp", r"Dong\s?Thap", r"An\s?Giang",
                  r"Kiên\s?Giang", r"Kien\s?Giang", r"Cần\s?Thơ", r"Can\s?Tho",
                  r"Hậu\s?Giang", r"Hau\s?Giang", r"Sóc\s?Trăng", r"Soc\s?Trang",
                  r"Bạc\s?Liêu", r"Bac\s?Lieu", r"Cà\s?Mau", r"Ca\s?Mau",
                  r"Tây\s?Ninh", r"Tay\s?Ninh", r"Bình\s?Phước", r"Binh\s?Phuoc"
              ]),

              # === TIN TỨC ===
              ("10. Tin Tức - Thời Sự", [
                  r"\bVNews\b", r"Thông\s?Tấn", r"Thong\s?Tan",
                  r"Quốc\s?Hội", r"Quoc\s?Hoi", r"Nhân\s?Dân", r"Nhan\s?Dan",
                  r"\bANTV\b", r"\bQPVN\b", r"CNN", r"BBC\s?World",
                  r"France\s?24", r"\bDW\b", r"Euronews", r"Al\s?Jazeera",
                  r"\bCNBC\b", r"\bBloomberg\b", r"\bCNA\b", r"Channel\s?News\s?Asia",
                  r"NHK\s?World", r"Arirang\s?TV"
              ]),

              # === THIẾU NHI (sau VTV để VTV7 không bị VTV hớt) ===
              ("15. Thiếu Nhi - Giáo Dục", [
                  r"VTV7", r"VTV\s?7\b", r"HTV3", r"HTV\s?3\b",
                  r"ON\s?Kids", r"K\+\s?Kids",
                  r"Cartoon", r"Disney", r"Nickelodeon", r"Nick\s?Jr",
                  r"Baby\s?TV", r"CBeebies", r"Da\s?Vinci",
                  r"Discovery\s?Kids", r"Thiếu\s?Nhi", r"Thieu\s?Nhi",
                  r"Giáo\s?Dục", r"Giao\s?Duc"
              ]),

              # === KHOA HỌC ===
              ("16. Khoa Học - Khám Phá", [
                  r"Discovery\s?(Channel|Science)", r"Animal\s?Planet",
                  r"National\s?Geographic", r"Nat\s?Geo",
                  r"\bHistory\b", r"BBC\s?Earth", r"\bTLC\b",
                  r"Travel\s?Channel", r"Science"
              ]),

              # === PHIM ===
              ("13. Phim - Series", [
                  r"\bHBO\b", r"Cinemax", r"Star\s?Movies", r"\bAXN\b",
                  r"Warner\s?TV", r"Hollywood", r"Box\s?Movie", r"\bKix\b",
                  r"Blue\s?Ant", r"ON\s?Movies", r"ON\s?Cine",
                  r"K\+\s?Cine", r"K\+\s?Action",
                  r"SCTV\s?Phim", r"HTVC\s?Phim"
              ]),

              # === GIẢI TRÍ ===
              ("14. Giải Trí - Tổng Hợp", [
                  r"Yeah1", r"TodayTV", r"Vie\s?(Channel|Giải\s?Trí|Giai\s?Tri)",
                  r"ON\s?Vie", r"ON\s?Trending",
                  r"SCTV\s?[67]|SCTV\s?13",
                  r"Entertainment", r"General"
              ]),

              # === ÂM NHẠC ===
              ("17. Âm Nhạc", [
                  r"\bMTV\b", r"Channel\s?V", r"ON\s?Music",
                  r"Ca\s?Nhạc", r"Ca\s?Nhac", r"\bMusic\b", r"\biTV\b"
              ]),

              # === TRUNG QUỐC ===
              ("18. Kênh Trung Quốc", [
                  r"\bCCTV\b", r"\bCGTN\b", r"Dragon\s?TV", r"Hunan\s?TV",
                  r"Jiangsu\s?TV", r"Zhejiang\s?TV", r"Phoenix\s?TV",
                  r"Shenzhen\s?TV", r"Guangdong\s?TV", r"Beijing\s?TV", r"Shanghai\s?TV"
              ]),

              # === QUỐC TẾ (còn lại) ===
              ("19. Kênh Quốc Tế", [
                  r"TV5Monde", r"France\s?24", r"\bDW\b", r"Euronews",
                  r"Al\s?Jazeera", r"\bNHK\b", r"Arirang", r"KBS\s?World",
                  r"\bRT\b", r"TRT\s?World",
                  r"ABC\s?News", r"CBS\s?News", r"NBC\s?News", r"Fox\s?News"
              ]),
          ]

          def detect_group(line):
              for group_name, patterns in groups:
                  for pattern in patterns:
                      if re.search(pattern, line, flags=re.IGNORECASE):
                          return group_name
              return "20. Kênh Chưa Phân Loại"

          output_lines = []
          for line in text.splitlines():
              if line.startswith("#EXTINF"):
                  group = detect_group(line)
                  if 'group-title="' in line:
                      line = re.sub(r'group-title="[^"]*"', f'group-title="{group}"', line)
                  else:
                      line = line.replace("#EXTINF:-1", f'#EXTINF:-1 group-title="{group}"', 1)
              output_lines.append(line)

          path.write_text("\n".join(output_lines) + "\n", encoding="utf-8")
          PY

          echo ""
          echo "===== KẾT QUẢ SAU KHI PHÂN NHÓM ====="
          echo "Tổng số kênh:"
          grep -c '^#EXTINF' output/user_result.m3u || true
          echo ""
          echo "Phân bổ theo nhóm:"
          grep '^#EXTINF' output/user_result.m3u | sed -n 's/.*group-title="\([^"]*\)".*/\1/p' | sort | uniq -c | sort -rn || true

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Fix channel grouping order & accuracy"
            git push --force
          fi
          
