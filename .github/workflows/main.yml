name: 'Update schedule'

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Set branch name
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Update IPTV playlist
        run: pipenv run dev

      - name: Post-process M3U (Thuật toán khớp thông minh Tối Ưu Hóa)
        run: |
          if [ ! -f output/user_result.m3u ]; then
            echo "LỖI: Không tìm thấy output/user_result.m3u"
            exit 1
          fi

          # Dọn dẹp sơ bộ
          sed -i 's/\$订阅源//g' output/user_result.m3u
          sed -i 's/未匹配频道/Kênh Chưa Phân Loại/g' output/user_result.m3u
          sed -i 's/无结果频道/Kênh Lỗi - Không Chạy/g' output/user_result.m3u
          sed -i 's/更新时间/Thời Gian Cập Nhật/g' output/user_result.m3u

          python3 <<'PY'
          from pathlib import Path
          import re
          from collections import Counter

          # --- HÀM CHUẨN HÓA THÔNG MINH ---
          def clean_name(text):
              t = text.lower()
              t = re.sub(r'[\(\[].*?[\)\]]', '', t)  # Bỏ cụm trong ngoặc (1080p), [Geo-blocked]
              t = re.sub(r'(?i)\b(fhd|hd|sd|4k|1080p|720p|2k)\b', '', t) # Bỏ chữ phân giải
              t = re.sub(r'[^a-z0-9\+\-\s]', '', t) # GIỮ LẠI dấu + (K+) và dấu - (CCTV-1)
              t = re.sub(r'\s+', ' ', t).strip()
              return t

          # --- 1. TẠO BẢN ĐỒ NHÓM TỪ FILE DEMO ---
          group_map = {}
          current_group = "Kênh Khác - Tổng Hợp"
          demo_path = Path("config/user_demo.txt")
          if demo_path.exists():
              with open(demo_path, "r", encoding="utf-8", errors="ignore") as f:
                  for line in f:
                      line = line.strip()
                      if line.endswith("#genre#"):
                          current_group = line.replace(",#genre#", "").strip()
                      elif line and not line.startswith("["):
                          norm = clean_name(line)
                          if norm and norm not in group_map:
                              group_map[norm] = current_group

          # QUAN TRỌNG: Sắp xếp từ khóa theo độ dài GIẢM DẦN. 
          # -> "vtv5 tây nam bộ" dài hơn "vtv5" nên sẽ được kiểm tra và gom đúng nhóm trước!
          sorted_keywords = sorted(group_map.keys(), key=len, reverse=True)

          # --- 2. XỬ LÝ FILE M3U ĐẦU RA ---
          path = Path("output/user_result.m3u")
          text = path.read_text(encoding="utf-8", errors="ignore")
          lines = text.splitlines()

          output = []
          seen_urls = set() # Chỉ xóa trùng link hỏng, TUYỆT ĐỐI GIỮ LẠI link dự phòng cho kênh

          if lines and lines[0].startswith("#EXTM3U"):
              first_line = re.sub(r'tvg-name="[^"]*"', '', lines[0])
              first_line = re.sub(r'group-title="[^"]*"', '', first_line)
              output.append(first_line.split(",")[0].strip())
              start_idx = 1
          else:
              start_idx = 0

          current_extinf = None
          for i in range(start_idx, len(lines)):
              line = lines[i].strip()
              if not line: continue
              
              if line.startswith("#EXTINF"):
                  current_extinf = line
              else:
                  if current_extinf:
                      url = line
                      # Xóa link trùng lặp y hệt nhau để app đỡ nặng
                      if url in seen_urls:
                          current_extinf = None
                          continue
                      
                      parts = current_extinf.split(",")
                      raw_channel_name = parts[-1].strip() if len(parts) > 1 else ""
                      
                      # Fix lỗi hiển thị ngày giờ thành tên kênh
                      if re.match(r'^\d{4}-\d{2}-\d{2}', raw_channel_name) or "更新时间" in current_extinf or "Thời Gian" in current_extinf:
                          match_id = re.search(r'tvg-id="([^"]*)"', current_extinf)
                          raw_channel_name = match_id.group(1) if match_id else "Unknown"
                      
                      # Cạo sạch chữ Trung Quốc (Việt hóa giao diện)
                      display_name = re.sub(r'[\u4e00-\u9fff]', '', raw_channel_name)
                      display_name = re.sub(r'\(\s*\)', '', display_name)
                      display_name = re.sub(r'^[-_|\s]+|[-_|\s]+$', '', display_name).strip()
                      if not display_name:
                          display_name = raw_channel_name
                          
                      norm_m3u = clean_name(display_name)
                      
                      # TIẾN HÀNH KHỚP NHÓM TỪ BẢN ĐỒ
                      matched_group = "Kênh Chưa Phân Loại"
                      for kw in sorted_keywords:
                          # Khớp tuyệt đối, hoặc khớp có cụm từ đứng đầu (VTV1 HD -> khớp VTV1)
                          if norm_m3u == kw or norm_m3u.startswith(kw + " ") or norm_m3u.startswith(kw + "-"):
                              matched_group = group_map[kw]
                              break
                      
                      seen_urls.add(url)
                      
                      base_info = parts[0]
                      if 'group-title="' in base_info:
                          base_info = re.sub(r'group-title="[^"]*"', f'group-title="{matched_group}"', base_info)
                      else:
                          base_info = base_info.replace("#EXTINF:-1", f'#EXTINF:-1 group-title="{matched_group}"', 1)
                      
                      output.append(f"{base_info},{display_name}")
                      output.append(url)
                      current_extinf = None

          path.write_text("\n".join(output) + "\n", encoding="utf-8")

          print(f"\n{'='*60}")
          print(f"✅ TỔNG SỐ LUỒNG PHÁT (Đã bao gồm link dự phòng): {len(seen_urls)}")
          print(f"{'='*60}")
          
          groups_list = []
          for l in output:
              if l.startswith("#EXTINF"):
                  m = re.search(r'group-title="([^"]*)"', l)
                  if m: groups_list.append(m.group(1))
                  
          print(f"\nPHÂN BỔ CHI TIẾT TỪNG NHÓM:")
          for g, c in sorted(Counter(groups_list).items()):
              print(f"  {c:>4}  {g}")
          print(f"{'='*60}\n")
          PY

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Fixed exact keyword matching and restored backup links"
            git push --force
          fi
