      - name: Create Ultimate Anti-Duplicate Script
        run: |
          cat << 'PYEOF' > filter.py
          import re
          from pathlib import Path
          import sys

          m3u_file_path = sys.argv[1] if len(sys.argv) > 1 else ""
          if not m3u_file_path or not Path(m3u_file_path).exists():
              sys.exit(0)

          def remove_chinese(text):
              return re.sub(r'[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u3000-\u303f\uff00-\uffef]', '', text).strip()

          def clean_text_for_match(text):
              if not text: return ""
              t = str(text).strip()
              
              # Loại bỏ các tag không cần thiết
              t = re.sub(r'[\(\[【].*?[\)\]】]', '', t)
              t = remove_chinese(t)
              
              # Giữ HD, Tây Nam Bộ, Tây Nguyên...
              t = re.sub(r'(?i)\b(fhd|1080p|720p|2k|4k|8k|uhd|hevc|h264|h265|live|backup|du phong|dự phòng|test|vn|vietnam|geo-blocked|stream)\b', '', t)
              
              t = re.sub(r'[^\w\s\+\-]', ' ', t, flags=re.UNICODE)
              t = re.sub(r'\s+', ' ', t).strip().lower()
              
              # Chuẩn hóa VTV, HTV, SCTV...
              t = re.sub(r'\b(vtv|htv|sctv|vtvcab|k\+?|k plus)\s*(\d+)', r'\1\2', t)
              return t

          # ==========================================
          # 1. LOAD DEMO STRUCTURE
          # ==========================================
          demo_path = Path("config/user_demo.txt")
          group_order = []
          demo_structure = {}
          
          if demo_path.exists():
              current_group = None
              with open(demo_path, "r", encoding="utf-8", errors="ignore") as f:
                  for line in f:
                      line = line.strip()
                      if not line: continue
                      if line.endswith("#genre#"):
                          current_group = line.replace(",#genre#", "").strip()
                          if current_group not in group_order:
                              group_order.append(current_group)
                              demo_structure[current_group] = []
                      elif current_group and line not in demo_structure[current_group]:
                          demo_structure[current_group].append(line)

          # Tạo search map với nhiều mức độ clean
          search_map = []
          for grp in group_order:
              for ch in demo_structure[grp]:
                  clean_c = clean_text_for_match(ch)
                  if clean_c:
                      search_map.append({
                          'clean': clean_c,
                          'original': ch,
                          'group': grp,
                          'len': len(clean_c)
                      })

          # Sắp xếp: dài nhất trước
          search_map.sort(key=lambda x: x['len'], reverse=True)

          # ==========================================
          # 2. XỬ LÝ M3U
          # ==========================================
          m3u_path = Path(m3u_file_path)
          lines = m3u_path.read_text(encoding="utf-8", errors="ignore").replace("$订阅源", "").splitlines()

          results = {grp: {ch: None for ch in demo_structure[grp]} for grp in group_order}
          seen_urls = set()
          current_extinf = None

          for line in lines:
              line = line.strip()
              if not line or line.startswith("#EXTM3U"): continue
              
              if line.startswith("#EXTINF"):
                  current_extinf = line
                  continue
              
              if current_extinf:
                  url = line
                  if url in seen_urls or any(x in current_extinf for x in ["更新时间", "Thời Gian", "更新"]):
                      current_extinf = None
                      continue

                  parts = current_extinf.split(",", 1)
                  raw_name = parts[-1].strip() if len(parts) > 1 else ""
                  
                  # Lấy tvg-id nếu tên bị lỗi
                  if re.match(r'^\d{4}-\d{2}-\d{2}', raw_name):
                      m = re.search(r'tvg-id="([^"]*)"', current_extinf)
                      if m: raw_name = m.group(1)

                  clean_m3u = clean_text_for_match(raw_name)
                  if not clean_m3u:
                      current_extinf = None
                      continue

                  # Matching
                  best_match = None
                  for item in search_map:
                      clean_demo = item['clean']
                      # Cách 1: Khớp chính xác hoặc bắt đầu
                      if clean_m3u == clean_demo or clean_m3u.startswith(clean_demo + " "):
                          best_match = item
                          break
                      # Cách 2: Khớp từ (cho trường hợp dài dòng)
                      if len(clean_demo) > 8 and clean_demo in clean_m3u:
                          best_match = item
                          break

                  if best_match:
                      grp = best_match['group']
                      ch = best_match['original']
                      
                      if results[grp][ch] is None:   # Chỉ lấy link đầu tiên (nhanh nhất)
                          base = parts[0]
                          if 'group-title="' in base:
                              base = re.sub(r'group-title="[^"]*"', f'group-title="{grp}"', base)
                          else:
                              base = base.replace("#EXTINF:-1", f'#EXTINF:-1 group-title="{grp}"', 1)
                          
                          results[grp][ch] = (f"{base},{ch}", url)
                          seen_urls.add(url)

                  current_extinf = None

          # ==========================================
          # 3. XUẤT FILE
          # ==========================================
          output_lines = ["#EXTM3U"]
          total = 0
          missing = []

          for grp in group_order:
              output_lines.append(f"{grp},#genre#")
              for ch in demo_structure[grp]:
                  if results[grp][ch] is not None:
                      extinf, url = results[grp][ch]
                      output_lines.append(extinf)
                      output_lines.append(url)
                      total += 1
                  else:
                      missing.append(f"  • {grp} → {ch}")

          Path("output/user_result.m3u").write_text("\n".join(output_lines) + "\n", encoding="utf-8")

          print(f"✅ TỔNG SỐ KÊNH KHỚP: {total}/{sum(len(chs) for chs in demo_structure.values())}")
          if missing:
              print(f"⚠️  Thiếu {len(missing)} kênh:")
              print("\n".join(missing[:30]))  # chỉ in 30 kênh đầu
          PYEOF
