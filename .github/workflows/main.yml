name: 'Update schedule'

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Set branch name
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Update IPTV playlist
        run: pipenv run dev

      - name: Clean, translate and regroup channels
        run: |
          if [ ! -f output/user_result.m3u ]; then
            echo "Không tìm thấy output/user_result.m3u"
            exit 1
          fi

          python3 <<'PY'
          import re
          from pathlib import Path

          path = Path("output/user_result.m3u")
          text = path.read_text(encoding="utf-8", errors="ignore")
          
          # 🟢 BƯỚC 1: VIỆT HÓA TOÀN BỘ CỤM TỪ HỆ THỐNG CỦA SCRIPT
          text = text.replace("未匹配频道", "Kênh Chưa Phân Loại")
          text = text.replace("无结果频道", "Kênh Lỗi - Không Chạy")
          text = text.replace("更新时间", "Thời Gian Cập Nhật")
          text = text.replace("$订阅源", "")
          
          lines = text.splitlines()
          output_lines = []
          
          # Xử lý cắt dải ngày giờ rác ở dòng đầu tiên của file
          if lines and lines[0].startswith("#EXTM3U"):
              first_line = lines[0]
              first_line = re.sub(r'tvg-name="[^"]*"', '', first_line)
              first_line = re.sub(r'group-title="[^"]*"', '', first_line)
              output_lines.append(first_line.split(",")[0].strip())
              start_idx = 1
          else:
              start_idx = 0

          # Từ điển phân 20 nhóm tự động
          categories_mapping = {
              "01. VTV - Kênh Quốc Gia": [r"\bVTV\s?\d+\b"],
              "02. HTV - TP.HCM": [r"\bHTV\s?\d+\b", r"\bHTVC\b", r"HTV\s?Thể\s?Thao", r"HTV\s?Sports", r"HTV\s?Key"],
              "03. Địa Phương - Miền Bắc": [r"Hà Nội", r"Hanoi", r"Hải Phòng", r"QTV", r"Quảng Ninh", r"Bắc Ninh", r"Bắc Giang", r"Hải Dương", r"Hưng Yên", r"Thái Bình", r"Nam Định", r"Ninh Bình", r"Thanh Hóa", r"Nghệ An", r"NTV", r"Hà Tĩnh", r"Tuyên Quang", r"Lào Cai", r"Yên Bái", r"Phú Thọ", r"Thái Nguyên", r"Cao Bằng", r"Bắc Kạn", r"Lạng Sơn", r"Điện Biên", r"Lai Châu", r"Sơn La", r"Hòa Bình"],
              "04. Địa Phương - Miền Trung": [r"Quảng Bình", r"Quảng Trị", r"Huế", r"TRT", r"Đà Nẵng", r"DRT", r"Quảng Nam", r"QRT", r"Quảng Ngãi", r"PTQ", r"Bình Định", r"Phú Yên", r"Khánh Hòa", r"KTV", r"Ninh Thuận", r"Bình Thuận", r"Kon Tum", r"Gia Lai", r"THGL", r"Đắk Lắk", r"Đắk Nông", r"Lâm Đồng", r"LTV"],
              "05. Địa Phương - Miền Nam": [r"THVL", r"THĐT", r"THDT", r"THAG", r"THKG", r"THLA", r"THBT", r"THTG", r"THTPCT", r"HGTV", r"STV", r"BLTV", r"BPTV", r"Bình Dương", r"Đồng Nai", r"DNRTV", r"Bà Rịa", r"Vũng Tàu", r"BRT", r"Long An", r"Tiền Giang", r"Bến Tre", r"Trà Vinh", r"Đồng Tháp", r"An Giang", r"Kiên Giang", r"Cần Thơ", r"Hậu Giang", r"Sóc Trăng", r"Bạc Liêu", r"Cà Mau", r"CTV", r"Tây Ninh", r"TTV11", r"Bình Phước"],
              "06. VTVcab - Truyền Hình Cáp Việt Nam": [r"VTVcab", r"\bON\s?Sports\b", r"\bON\s?Football\b", r"\bON\s?Golf\b", r"\bON\s?Movies\b", r"\bON\s?Music\b", r"\bON\s?Kids\b", r"\bON\s?Vie\b", r"\bON\s?Cine\b", r"\bON\s?Trending\b"],
              "07. SCTV": [r"\bSCTV\s?\d+\b", r"SCTV\s?Phim", r"SCTV\s?Thể\s?Thao", r"SCTV\s?Sports", r"SCTV\s?Ca\s?Nhạc", r"SCTV\s?Thiếu\s?Nhi"],
              "08. FPT Play - FPT TV": [r"\bFPT\b", r"FPT\s?Play", r"FPT\s?TV"],
              "09. K Plus": [r"\bK\+\b", r"K\+\s?Sport", r"K\+\s?Cine", r"K\+\s?Life", r"K\+\s?Kids", r"\bKPlus\b"],
              "10. Tin Tức - Thời Sự": [r"VNews", r"Thông Tấn", r"Quốc Hội", r"Nhân Dân", r"ANTV", r"QPVN"],
              "11. Thể Thao Việt Nam": [r"Bóng Đá TV", r"Thể Thao TV"],
              "12. Thể Thao Quốc Tế": [r"ESPN", r"Fox\s?Sports", r"Sky\s?Sports", r"beIN", r"Eurosport", r"DAZN", r"CBS\s?Sports", r"TNT\s?Sports", r"BT\s?Sport", r"Premier\s?League", r"NBA\s?TV", r"NFL", r"MLB", r"Golf\s?Channel", r"WWE", r"UFC"],
              "13. Phim - Series": [r"HBO", r"Cinemax", r"Star\s?Movies", r"AXN", r"Warner", r"Hollywood", r"Box\s?Movie", r"Kix", r"Blue\s?Ant"],
              "14. Giải Trí - Tổng Hợp": [r"Yeah1", r"TodayTV", r"Vie Channel", r"Vie Giải Trí", r"Entertainment", r"General"],
              "15. Thiếu Nhi - Giáo Dục": [r"Cartoon Network", r"Disney", r"Nickelodeon", r"Nick\s?Jr", r"Baby\s?TV", r"CBeebies", r"Da\s?Vinci"],
              "16. Khoa Học - Khám Phá": [r"Discovery", r"Animal\s?Planet", r"National\s?Geographic", r"Nat\s?Geo", r"History", r"BBC\s?Earth", r"TLC", r"Travel", r"Science"],
              "17. Âm Nhạc": [r"MTV", r"Channel\s?V", r"iTV", r"Music"],
              "18. Kênh Trung Quốc": [r"CCTV", r"CGTN", r"Dragon", r"Hunan", r"Jiangsu", r"Zhejiang", r"Phoenix", r"Shenzhen", r"Guangdong", r"Beijing", r"Shanghai"],
              "19. Kênh Quốc Tế": [r"TV5Monde", r"France\s?24", r"\bDW\b", r"Euronews", r"Al\s?Jazeera", r"CNBC", r"Bloomberg", r"CNA", r"NHK", r"Arirang", r"KBS\s?World", r"RT", r"TRT\s?World", r"ABC\s?News", r"CBS\s?News", r"NBC\s?News", r"Fox\s?News"]
          }

          current_extinf = None
          for i in range(start_idx, len(lines)):
              line = lines[i].strip()
              if not line:
                  continue
              if line.startswith("#EXTINF"):
                  current_extinf = line
              else:
                  if current_extinf:
                      # Chặn không cho kênh "Thời Gian Cập Nhật" lọt vào danh sách
                      if "Thời Gian Cập Nhật" in current_extinf:
                          current_extinf = None
                          continue
                      
                      url = line.strip()
                      parts = current_extinf.split(",")
                      channel_name = parts[-1].strip() if len(parts) > 1 else ""
                      
                      # Fix lỗi hiển thị ngày giờ thay cho tên kênh
                      if re.match(r'\d{4}-\d{2}-\d{2}', channel_name):
                          match_id = re.search(r'tvg-id="([^"]*)"', current_extinf)
                          if match_id:
                              channel_name = match_id.group(1)
                      
                      # 🟢 BƯỚC 2: CẠO SẠCH CHỮ TRUNG QUỐC Ở TÊN KÊNH (Việt Hóa)
                      # Thay thế toàn bộ chữ Hán bằng khoảng trống
                      channel_name = re.sub(r'[\u4e00-\u9fff]', '', channel_name).strip()
                      # Xóa các ký tự rác bị thừa ra sau khi cạo chữ Hán (như dấu ngoặc rỗng, dấu gạch ngang đứng trơ trọi)
                      channel_name = re.sub(r'\(\s*\)', '', channel_name)
                      channel_name = re.sub(r'^[-_|\s]+|[-_|\s]+$', '', channel_name).strip()
                      
                      # Gom nhóm theo 20 mục
                      assigned_group = "20. Kênh Chưa Phân Loại"
                      for group_name, patterns in categories_mapping.items():
                          if any(re.search(p, channel_name, re.IGNORECASE) for p in patterns) or any(re.search(p, current_extinf, re.IGNORECASE) for p in patterns):
                              assigned_group = group_name
                              break
                      
                      base_info = parts[0]
                      if 'group-title="' in base_info:
                          base_info = re.sub(r'group-title="[^"]*"', f'group-title="{assigned_group}"', base_info)
                      else:
                          base_info = base_info.replace("#EXTINF:-1", f'#EXTINF:-1 group-title="{assigned_group}"', 1)
                      
                      output_lines.append(f"{base_info},{channel_name}")
                      output_lines.append(url)
                      current_extinf = None

          path.write_text("\n".join(output_lines) + "\n", encoding="utf-8")
          PY

          echo "===== THỐNG KÊ KẾT QUẢ DANH SÁCH ====="
          grep 'group-title=' output/user_result.m3u | sed 's/.*group-title="\([^"]*\)".*/\1/' | sort | uniq -c || true
      
      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Kept Chinese Channels but removed all Chinese Characters (Viet Hoa)"
            git push --force
          fi
