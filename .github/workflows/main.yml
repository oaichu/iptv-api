- name: Post-process M3U Filter
  run: |
    if [ ! -f output/user_result.m3u ]; then
      echo "LỖI: Không tìm thấy output/user_result.m3u"
      exit 1
    fi

    python3 <<'PY'
    from pathlib import Path
    import re

    # ========== 1. Làm sạch tên nhưng GIỮ dấu tiếng Việt ==========
    def clean_name(text: str) -> str:
        t = text.lower().strip()
        # Xoá nội dung trong ngoặc (...) [...]
        t = re.sub(r'[\(\[].*?[\)\]]', '', t)
        # Xoá từ khoá độ phân giải (có thể tuỳ chỉnh)
        t = re.sub(r'\b(fhd|hd|sd|4k|1080p|720p|2k)\b', '', t, flags=re.IGNORECASE)
        # Giữ chữ cái Unicode, số, khoảng trắng, dấu +, -
        t = re.sub(r'[^\w\s\+\-]', '', t, flags=re.UNICODE)
        # Xoá dấu +, - thừa ở đầu/cuối (nếu muốn)
        t = t.strip('+- ')
        # Gộp nhiều khoảng trắng
        t = re.sub(r'\s+', ' ', t)
        return t.strip()

    # ========== 2. Đọc file demo lấy danh sách nhóm + kênh theo đúng thứ tự ==========
    demo_path = Path("config/user_demo.txt")
    groups_order = []                     # thứ tự các nhóm
    channels_in_group = {}                # nhóm -> [tên gốc, tên gốc, ...]
    current_group = None

    if demo_path.exists():
        with open(demo_path, "r", encoding="utf-8", errors="ignore") as f:
            for line in f:
                line = line.strip()
                if not line:
                    continue
                if line.endswith("#genre#"):
                    current_group = line.replace(",#genre#", "").strip()
                    if current_group not in groups_order:
                        groups_order.append(current_group)
                        channels_in_group[current_group] = []
                else:
                    if current_group:
                        channels_in_group[current_group].append(line)
    else:
        print("CẢNH BÁO: Không tìm thấy config/user_demo.txt")
        exit(1)

    # Tạo ánh xạ: tên sạch -> (nhóm, vị trí trong demo)
    # dùng tuple (nhóm, index) để khi sắp xếp giữ đúng thứ tự demo
    position_map = {}   # clean_name -> (group, idx_in_group)
    for grp in groups_order:
        for idx, ch_name in enumerate(channels_in_group[grp]):
            clean = clean_name(ch_name)
            # Nếu có trùng lặp tên sạch, ưu tiên cái đầu tiên (theo demo)
            if clean not in position_map:
                position_map[clean] = (grp, idx)

    # ========== 3. Đọc M3U và nhóm kênh theo demo ==========
    path = Path("output/user_result.m3u")
    text = path.read_text(encoding="utf-8", errors="ignore")
    text = text.replace("$订阅源", "")
    lines = text.splitlines()

    # Cấu trúc lưu kênh: { group: [ (extinf, url), ... ] }
    grouped = {grp: [] for grp in groups_order}
    unmatched = []   # kênh không khớp demo

    seen_urls = set()
    start_idx = 1 if (lines and lines[0].startswith("#EXTM3U")) else 0

    current_extinf = None
    for i in range(start_idx, len(lines)):
        line = lines[i].strip()
        if not line:
            continue
        if line.startswith("#EXTINF"):
            current_extinf = line
        else:
            if not current_extinf:
                continue
            url = line

            # Bỏ qua dòng cập nhật thời gian
            if "更新时间" in current_extinf or "Thời Gian Cập Nhật" in current_extinf:
                current_extinf = None
                continue

            if url in seen_urls:
                current_extinf = None
                continue

            # Lấy tên hiển thị
            parts = current_extinf.split(",")
            raw_channel_name = parts[-1].strip() if len(parts) > 1 else ""

            # Nếu tên chỉ là ngày tháng (YYYY-MM-DD), lấy tvg-id
            if re.match(r'^\d{4}-\d{2}-\d{2}', raw_channel_name):
                match_id = re.search(r'tvg-id="([^"]*)"', current_extinf)
                raw_channel_name = match_id.group(1) if match_id else raw_channel_name

            # Xoá ký tự Trung Quốc, ngoặc rỗng, ký tự thừa
            display_name = re.sub(r'[\u4e00-\u9fff]', '', raw_channel_name)
            display_name = re.sub(r'\(\s*\)', '', display_name)
            display_name = re.sub(r'^[-_|\s]+|[-_|\s]+$', '', display_name).strip()
            if not display_name:
                display_name = raw_channel_name

            clean_display = clean_name(display_name)

            # So khớp với danh sách demo
            if clean_display in position_map:
                grp, demo_idx = position_map[clean_display]
                seen_urls.add(url)

                # Chèn group-title vào #EXTINF
                base_info = parts[0]
                if 'group-title="' in base_info:
                    base_info = re.sub(r'group-title="[^"]*"', f'group-title="{grp}"', base_info)
                else:
                    base_info = base_info.replace("#EXTINF:-1", f'#EXTINF:-1 group-title="{grp}"', 1)

                grouped[grp].append( (demo_idx, f"{base_info},{display_name}", url) )
            else:
                # Kênh không có trong demo -> cho vào danh sách riêng (nếu muốn giữ)
                unmatched.append( (current_extinf, url) )

            current_extinf = None

    # ========== 4. Xuất kết quả đúng thứ tự demo ==========
    output_lines = ['#EXTM3U']
    total_channels = 0

    for grp in groups_order:
        # Lấy danh sách kênh đã nhóm, sắp xếp theo vị trí demo_idx
        sorted_entries = sorted(grouped[grp], key=lambda x: x[0])   # x[0] là demo_idx
        for _, extinf_line, url_line in sorted_entries:
            output_lines.append(extinf_line)
            output_lines.append(url_line)
            total_channels += 1

    # (Tuỳ chọn) Thêm kênh không khớp vào cuối cùng, có group-title "Kênh Khác"
    if unmatched:
        output_lines.append('')
        for extinf, url in unmatched:
            # Thêm group-title nếu chưa có
            if 'group-title="' not in extinf:
                extinf = extinf.replace("#EXTINF:-1", '#EXTINF:-1 group-title="Kênh Khác"')
            output_lines.append(extinf)
            output_lines.append(url)
            total_channels += 1

    path.write_text("\n".join(output_lines) + "\n", encoding="utf-8")

    # ========== 5. In thông tin ==========
    print(f"\n{'='*60}")
    print(f"✅ TỔNG SỐ KÊNH SÓNG THU ĐƯỢC: {total_channels}")
    print(f"{'='*60}")
    print("THỨ TỰ HIỂN THỊ CÁC NHÓM (theo demo):")
    for idx, grp in enumerate(groups_order, 1):
        count = len(grouped[grp])
        print(f"  {idx:02d}. [{count:>4} kênh] - {grp}")
    if unmatched:
        print(f"  --. [{len(unmatched):>4} kênh] - Kênh Khác (không có trong demo)")
    print(f"{'='*60}\n")
    PY
