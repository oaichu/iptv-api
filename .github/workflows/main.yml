name: 'Update schedule'

# NOTICE: Do NOT add `on: schedule` cron triggers in forked repositories.
# Forks may multiply scheduled runs and GitHub Actions resource usage is near limits.
# Many scheduled workflows from forks can cause workflows to be disabled.
# If scheduled execution is required, use other deployment methods.

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 */6 * * *'   # Bỏ comment nếu muốn chạy tự động mỗi 6 tiếng

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push:
    runs-on: ${{ matrix.operating-system }}
    strategy:
      matrix:
        operating-system: ['ubuntu-latest']
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Set branch name
        id: vars
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Update
        run: pipenv run dev

      - name: Clean Suffix and Translate to Vietnamese + Group Channels
        run: |
          sed -i 's/\$订阅源//g' output/user_result.m3u
          sed -i 's/未匹配频道/Kênh Việt Nam/g' output/user_result.m3u
          sed -i 's/无结果频道/Kênh Lỗi - Không Chạy/g' output/user_result.m3u
          sed -i 's/更新时间/Thời Gian Cập Nhật/g' output/user_result.m3u

          # Phân nhóm kênh tự động (VTV, Địa phương, HTV, SCTV, FPT, Quốc tế...)
          sed -i '/#EXTINF/s/group-title="[^"]*"/group-title="VTV (Kênh Quốc Gia)"/g' output/user_result.m3u
          sed -i '/VTV[0-9]/s/group-title="[^"]*"/group-title="VTV (Kênh Quốc Gia)"/g' output/user_result.m3u
          sed -i '/THVL\|THDT\|THAN\|THBD\|THQN\|THNA\|THLA\|THAG\|THQN\|THBT/s/group-title="[^"]*"/group-title="Địa Phương (Tỉnh\/Thành)"/g' output/user_result.m3u
          sed -i '/HTV[0-9]\|HTV HD/s/group-title="[^"]*"/group-title="HTV (TP.HCM)"/g' output/user_result.m3u
          sed -i '/VTV Cab\|VTVcab/s/group-title="[^"]*"/group-title="VTV Cab \/ Truyền Hình Cáp VN"/g' output/user_result.m3u
          sed -i '/SCTV[0-9]\|SCTV HD/s/group-title="[^"]*"/group-title="SCTV"/g' output/user_result.m3u
          sed -i '/FPT\|FPT Play/s/group-title="[^"]*"/group-title="FPT Play \/ FPT TV"/g' output/user_result.m3u
          sed -i '/CNN\|BBC\|Discovery\|National Geographic\|VTV World/s/group-title="[^"]*"/group-title="Quốc Tế"/g' output/user_result.m3u

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Github Action Auto Updated with Vietnamese Translation & Channel Groups"
            git push --force
          fi
