name: 'Update schedule'

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Set branch name
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Debug - Show config
        run: |
          echo "========== config/config.ini =========="
          cat config/config.ini || echo "FILE NOT FOUND"
          echo ""
          echo "========== user_demo.txt =========="
          echo "Số nhóm: $(grep -c '#genre#' config/user_demo.txt || echo 0)"
          echo "Tổng số kênh trong demo: $(grep -v '^[[:space:]]*$' config/user_demo.txt | grep -v '#genre#' | wc -l || echo 0)"

      - name: Update IPTV playlist
        run: pipenv run dev

      - name: Post-process M3U (Giữ kênh trong demo + Khớp mờ + Loại trùng)
        run: |
          if [ ! -f output/user_result.m3u ]; then
            echo "LỖI: Không tìm thấy output/user_result.m3u"
            exit 1
          fi

          sed -i 's/\$订阅源//g' output/user_result.m3u
          sed -i 's/未匹配频道/Kênh Chưa Phân Loại/g' output/user_result.m3u
          sed -i 's/无结果频道/Kênh Lỗi - Không Chạy/g' output/user_result.m3u
          sed -i 's/更新时间/Thời Gian Cập Nhật/g' output/user_result.m3u

          python3 <<'PY'
          from pathlib import Path
          import re
          from collections import Counter

          # === ĐỌC DANH SÁCH KÊNH ĐƯỢC PHÉP (từ user_demo.txt) ===
          allowed = set()
          demo_path = Path("config/user_demo.txt")
          if demo_path.exists():
              with open(demo_path, "r", encoding="utf-8", errors="ignore") as f:
                  for line in f:
                      line = line.strip().lower()
                      if line and not line.endswith("#genre#") and not line.startswith("["):
                          allowed.add(line)

          print(f"Số kênh được phép (demo): {len(allowed)}")

          # === XỬ LÝ M3U ===
          path = Path("output/user_result.m3u")
          text = path.read_text(encoding="utf-8", errors="ignore")
          lines = text.splitlines()

          seen = set()
          output = []
          i = 0
          while i < len(lines):
              line = lines[i]
              if line.startswith("#EXTINF"):
                  match = re.search(r',\s*(.+)$', line)
                  raw_name = match.group(1).strip().lower() if match else ""

                  # Chuẩn hóa tên: bỏ HD, bỏ khoảng trắng thừa, bỏ dấu câu
                  norm_name = re.sub(r'\s*hd\s*', '', raw_name)
                  norm_name = re.sub(r'\s+', ' ', norm_name).strip()

                  # Kiểm tra khớp mờ: tên demo nằm trong tên quét HOẶC ngược lại
                  matched = False
                  for demo_name in allowed:
                      if demo_name in norm_name or norm_name in demo_name:
                          matched = True
                          break

                  if matched:
                      key = norm_name
                      if i + 1 < len(lines) and not lines[i + 1].startswith("#"):
                          url_line = lines[i + 1]
                          if key not in seen:
                              seen.add(key)
                              output.append(line)
                              output.append(url_line)
                      i += 2
                      continue
              i += 1

          path.write_text("\n".join(output) + "\n", encoding="utf-8")

          total = len(output) // 2
          print(f"\n{'='*60}")
          print(f"✅ TỔNG SỐ KÊNH SAU KHI LỌC (khớp mờ): {total}")
          print(f"{'='*60}")

          groups_list = []
          for l in output:
              if l.startswith("#EXTINF"):
                  m = re.search(r'group-title="([^"]*)"', l)
                  if m:
                      groups_list.append(m.group(1))
          print(f"\nPHÂN BỔ THEO NHÓM:")
          for g, c in sorted(Counter(groups_list).items()):
              print(f"  {c:>4}  {g}")
          print(f"\n{'='*60}")
          PY

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Auto Updated IPTV - Lọc kênh mềm mại hơn"
            git push --force
          fi
          
