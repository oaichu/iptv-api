          print("THỨ TỰ HIỂN THỊ CÁC NHÓM TRÊN APP (Chuẩn 100% theo Demo):")
          for idx, grp in enumerate(group_order, 1):
              # Đếm số luồng thu được trong mỗi nhóm
              count = sum(1 for ch in demo_structure[grp] if results[grp][ch] is not None)
              print(f"  {idx:02d}. [{count:>3} kênh] - {grp}")
          print(f"{'='*60}\n")
          PYEOF

      - name: 'Run Filter'
        run: |
          if [ -f output/user_result.m3u ]; then
            python3 filter.py output/user_result.m3u
          elif [ -f output/result.m3u ]; then
            cp output/result.m3u output/user_result.m3u
            python3 filter.py output/user_result.m3u
          fi

      - name: 'Commit and push if changed'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "STRICT TEMPLATE: Generate M3U perfectly following demo list order with 1 link per channel"
            git push --force
          fi
