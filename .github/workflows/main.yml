name: 'Update schedule'
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: Set branch name
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Update IPTV playlist
        run: pipenv run dev

      - name: Create Filter Script
        run: |
          cat << 'PYEOF' > filter.py
          import re
          from pathlib import Path
          import sys

          _CJK = re.compile(r'[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u3000-\u303f\uff00-\uffef]')
          _BRACE = re.compile(r'[(\[【（〔][^\)\]】）〕]*[)\]】）〕]')
          _NOISE = re.compile(r'(?i)\b(fhd|1080[pi]|720p|2160p|4k|8k|uhd|hevc|h\.?26[45]|geo[\-\s]?blocked|backup|du\s?phong|test|stream|iptv)\b')
          _VN_SUFFIX = re.compile(r'(?i)(^|\s)vn(\s|$)')
          _CODE = re.compile(r'\b(vtv|htv|sctv|vtvcab|cctv|kbs|mbc|sbs|tvn|ocn|nhk|cna|cnbc|on)\s+(\d+)\b|\b(k\+?)\s*(\d+)\b', re.IGNORECASE)
          _SPC = re.compile(r'\s+')

          def _code_collapse(m):
              if m.group(1):
                  return m.group(1).lower() + m.group(2)
              return m.group(3).lower() + m.group(4)

          def norm(text: str, no_hd: bool = False) -> str:
              if not text: return ""
              t = _BRACE.sub(' ', text)
              t = _CJK.sub(' ', t)
              t = re.sub(r'[–—−]', '-', t)
              t = re.sub(r'[-_]', ' ', t)
              t = _NOISE.sub(' ', t)
              t = _VN_SUFFIX.sub(' ', t)
              if no_hd:
                  t = re.sub(r'(?i)\b(hd)\b', ' ', t)
              t = re.sub(r'[^\w\s+]', ' ', t, flags=re.UNICODE)
              t = _SPC.sub(' ', t).strip().lower()
              t = _CODE.sub(_code_collapse, t)
              return t

          m3u_path = Path(sys.argv[1]) if len(sys.argv) > 1 else Path("")
          demo_path = Path("config/user_demo.txt")

          if not m3u_path.exists():
              print("ERROR: M3U file not found")
              sys.exit(1)

          group_order = []
          demo_structure = {}
          if demo_path.exists():
              current_group = None
              with open(demo_path, encoding="utf-8", errors="ignore") as f:
                  for line in f:
                      line = line.strip()
                      if not line: continue
                      if line.endswith("#genre#"):
                          current_group = line.replace(",#genre#", "").strip()
                          if current_group not in group_order:
                              group_order.append(current_group)
                              demo_structure[current_group] = []
                      elif current_group and line not in demo_structure[current_group]:
                          demo_structure[current_group].append(line)

          exact_lut = {}
          nohd_lut = {}
          for grp in group_order:
              for ch in demo_structure[grp]:
                  key = norm(ch)
                  if key:
                      exact_lut[key] = (grp, ch)
                  key_nohd = norm(ch, no_hd=True)
                  if key_nohd and key_nohd != key:
                      nohd_lut[key_nohd] = (grp, ch)

          def find_slot(raw_name: str):
              k = norm(raw_name)
              if k in exact_lut: return exact_lut[k]
              k_nohd = norm(raw_name, no_hd=True)
              if k_nohd in exact_lut: return exact_lut[k_nohd]
              if k_nohd in nohd_lut: return nohd_lut[k_nohd]
              return None

          results = {grp: {ch: None for ch in demo_structure[grp]} for grp in group_order}
          seen_urls = set()
          lines = m3u_path.read_text(encoding="utf-8", errors="ignore").replace("$订阅源", "").splitlines()

          current_extinf = None
          for line in lines:
              line = line.strip()
              if not line or line.startswith("#EXTM3U"): continue
              if line.startswith("#EXTINF"):
                  current_extinf = line
                  continue
              if current_extinf is None: continue

              url = line
              if url in seen_urls or any(x in current_extinf for x in ["更新时间", "Thời Gian"]):
                  current_extinf = None
                  continue

              last_comma = current_extinf.rfind(",")
              raw_name = current_extinf[last_comma + 1:].strip() if last_comma != -1 else ""
              if re.match(r'^\d{4}-\d{2}-\d{2}', raw_name):
                  m = re.search(r'tvg-id="([^"]*)"', current_extinf)
                  if m: raw_name = m.group(1)

              slot = find_slot(raw_name)
              if slot:
                  grp, ch = slot
                  if results[grp][ch] is None:
                      extinf_head = current_extinf[:last_comma]
                      if 'group-title="' in extinf_head:
                          extinf_head = re.sub(r'group-title="[^"]*"', f'group-title="{grp}"', extinf_head)
                      else:
                          extinf_head = extinf_head.replace("#EXTINF:-1", f'#EXTINF:-1 group-title="{grp}"', 1)
                      results[grp][ch] = (f"{extinf_head},{ch}", url)
                      seen_urls.add(url)
              current_extinf = None

          out_lines = ["#EXTM3U"]
          total = 0
          for grp in group_order:
              for ch in demo_structure[grp]:
                  if results[grp][ch]:
                      extinf, url = results[grp][ch]
                      out_lines.append(extinf)
                      out_lines.append(url)
                      total += 1

          Path("output/user_result.m3u").write_text("\n".join(out_lines) + "\n", encoding="utf-8")
          print(f"✅ FILTER DONE: {total} kênh")
          PYEOF

      - name: Run Filter
        run: |
          if [ -f output/user_result.m3u ]; then
            python3 filter.py output/user_result.m3u
          elif [ -f output/result.m3u ]; then
            cp output/result.m3u output/user_result.m3u
            python3 filter.py output/user_result.m3u
          fi

      - name: Check Streams with FFprobe
        run: |
          cat << 'PYEOF' > check.py
          import subprocess
          import concurrent.futures
          from pathlib import Path

          PROBE_TIMEOUT = 9
          WORKERS = 20
          m3u_path = Path("output/user_result.m3u")

          pairs = []
          current = None
          for line in m3u_path.read_text(encoding="utf-8").splitlines():
              line = line.strip()
              if line.startswith("#EXTINF"):
                  current = line
              elif current and line and not line.startswith("#"):
                  pairs.append((current, line))
                  current = None

          def is_live(url):
              try:
                  result = subprocess.run([
                      "ffprobe", "-v", "quiet", "-timeout", str(PROBE_TIMEOUT*1000000),
                      "-analyzeduration", "1500000", "-probesize", "150000",
                      "-i", url, "-show_streams"
                  ], timeout=PROBE_TIMEOUT+5, capture_output=True)
                  return result.returncode == 0 and b'codec_name' in result.stdout
              except:
                  return False

          print(f"🔍 Checking {len(pairs)} channels...")

          live_pairs = []
          with concurrent.futures.ThreadPoolExecutor(max_workers=WORKERS) as executor:
              future_to_pair = {executor.submit(is_live, url): (extinf, url) for extinf, url in pairs}
              for future in concurrent.futures.as_completed(future_to_pair):
                  extinf, url = future_to_pair[future]
                  if future.result():
                      live_pairs.append((extinf, url))
                      print("✅ LIVE:", extinf.split(",")[-1])
                  else:
                      print("❌ DEAD:", extinf.split(",")[-1])

          out_lines = ["#EXTM3U"]
          for extinf, url in live_pairs:
              out_lines.extend([extinf, url])

          m3u_path.write_text("\n".join(out_lines) + "\n", encoding="utf-8")
          print(f"🎯 FINAL: {len(live_pairs)}/{len(pairs)} live channels")
          PYEOF

          python3 check.py
