name: 'Update schedule'

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Set branch name
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Update IPTV playlist
        run: pipenv run dev

      - name: Create Ultimate Anti-Duplicate Script
        run: |
          cat << 'PYEOF' > filter.py
          import re
          from pathlib import Path
          import sys

          m3u_file_path = sys.argv[1] if len(sys.argv) > 1 else ""
          if not m3u_file_path or not Path(m3u_file_path).exists():
              sys.exit(0)

          def remove_chinese(text):
              return re.sub(r'[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u3000-\u303f\uff00-\uffef]', '', text).strip()

          def clean_text_for_match(text):
              if not text: return ""
              t = str(text)
              t = re.sub(r'[\(\[【].*?[\)\]】]', '', t)
              t = remove_chinese(t)
              # GIỮ LẠI chữ HD để phân biệt chính xác VTV1 và VTV1 HD
              t = re.sub(r'(?i)\b(fhd|1080p|720p|2k|4k|8k|uhd|hevc|h264|h265|live|backup|du phong|dự phòng|test|vn|vietnam|geo-blocked)\b', '', t)
              t = re.sub(r'[^\w\s\+\-]', '', t, flags=re.UNICODE)
              t = re.sub(r'\s+', ' ', t).strip().lower()
              t = re.sub(r'\b(vtv|htv|sctv|vtvcab|k\+)\s+(\d+)\b', r'\1\2', t)
              return t

          # ==========================================
          # 1. NẠP KHUÔN ĐÚC TỪ FILE DEMO CỦA UER
          # ==========================================
          demo_path = Path("config/user_demo.txt")
          group_order = []
          demo_structure = {}

          if demo_path.exists():
              current_group = None
              with open(demo_path, "r", encoding="utf-8", errors="ignore") as f:
                  for line in f:
                      line = line.strip()
                      if not line: continue
                      if line.endswith("#genre#"):
                          current_group = line.replace(",#genre#", "").strip()
                          if current_group not in group_order:
                              group_order.append(current_group)
                              demo_structure[current_group] = []
                      elif current_group:
                          if line not in demo_structure[current_group]:
                              demo_structure[current_group].append(line)

          # Tạo bản đồ từ khóa tìm kiếm chính xác
          search_map = []
          for grp in group_order:
              for ch in demo_structure[grp]:
                  clean_c = clean_text_for_match(ch)
                  if clean_c:
                      search_map.append({
                          'clean': clean_c,
                          'original': ch,
                          'group': grp
                      })
          # Ưu tiên sắp xếp từ khóa DÀI NHẤT lên trước (VTV5 Tây Nam Bộ check trước VTV5, VTV1 HD check trước VTV1)
          search_map.sort(key=lambda x: len(x['clean']), reverse=True)

          # ==========================================
          # 2. PHÂN TÍCH VÀ ĐỐI SOÁT FILE M3U ĐẦU RA
          # ==========================================
          m3u_path = Path(m3u_file_path)
          lines = m3u_path.read_text(encoding="utf-8", errors="ignore").replace("$订阅源", "").splitlines()

          # Khởi tạo kết quả rỗng cho từng slot kênh chuẩn trong demo
          results = {grp: {ch: None for ch in demo_structure[grp]} for grp in group_order}
          seen_urls = set()

          current_extinf = None
          for line in lines:
              line = line.strip()
              if not line: continue
              if line.startswith("#EXTM3U"): continue
              
              if line.startswith("#EXTINF"):
                  current_extinf = line
              elif current_extinf:
                  url = line
                  if "更新时间" in current_extinf or "Thời Gian" in current_extinf or url in seen_urls:
                      current_extinf = None
                      continue
                  
                  parts = current_extinf.split(",")
                  raw_name = parts[-1].strip() if len(parts) > 1 else ""
                  
                  if re.match(r'^\d{4}-\d{2}-\d{2}', raw_name):
                      m = re.search(r'tvg-id="([^"]*)"', current_extinf)
                      if m: raw_name = m.group(1)
                  
                  clean_m3u = clean_text_for_match(raw_name)
                  
                  # THUẬT TOÁN ĐỊNH VỊ ĐÍCH DANH (BẢO VỆ SLOT KÊNH)
                  best_match_item = None
                  for item in search_map:
                      # Kiểm tra khớp từ đầu chuỗi chuẩn xác kèm ranh giới từ ký tự
                      pattern = r'^' + re.escape(item['clean']) + r'(?:\s|-|$)'
                      if re.match(pattern, clean_m3u):
                          best_match_item = item
                          break # Vì danh sách đã xếp từ dài đến ngắn, tìm thấy thằng dài nhất là dừng ngay
                  
                  # Nếu tìm thấy đích danh chủ nhân của luồng phát này
                  if best_match_item:
                      grp = best_match_item['group']
                      ch = best_match_item['original']
                      
                      # 🛑 CHỈ LẤY LINK ĐẦU TIÊN (LINK CHẠY NHANH NHẤT), HỦY TOÀN BỘ LINK DỰ PHÒNG SAU ĐÓ
                      if results[grp][ch] is None:
                          base = parts[0]
                          if 'group-title="' in base:
                              base = re.sub(r'group-title="[^"]*"', f'group-title="{grp}"', base)
                          else:
                              base = base.replace("#EXTINF:-1", f'#EXTINF:-1 group-title="{grp}"', 1)
                          
                          results[grp][ch] = (f"{base},{ch}", url)
                          seen_urls.add(url)
                  
                  current_extinf = None

          # ==========================================
          # 3. XUẤT FILE M3U SẠCH SẼ THEO ĐÚNG THỨ TỰ DEMO
          # ==========================================
          output_lines = ["#EXTM3U"]
          total = 0

          for grp in group_order:
              for ch in demo_structure[grp]:
                  if results[grp][ch] is not None:
                      extinf, url = results[grp][ch]
                      output_lines.append(extinf)
                      output_lines.append(url)
                      total += 1

          Path("output/user_result.m3u").write_text("\n".join(output_lines) + "\n", encoding="utf-8")
          print(f"TONG SO KÊNH ĐÃ KHỚP KHUÔN ĐÚC THÀNH CÔNG: {total}")
          PYEOF

      - name: Run Filter
        run: |
          if [ -f output/user_result.m3u ]; then
            python3 filter.py output/user_result.m3u
          elif [ -f output/result.m3u ]; then
            cp output/result.m3u output/user_result.m3u
            python3 filter.py output/user_result.m3u
          fi

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Strict 1-to-1 match avoiding prefix backup pollution"
            git push --force
          fi
