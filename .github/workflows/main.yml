name: 'Update schedule'

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  push:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Set branch name
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          update-environment: true
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Update IPTV playlist
        run: pipenv run dev

      - name: Post-process M3U Filter
        run: |
          if [ ! -f output/user_result.m3u ]; then
            echo "LỖI: Không tìm thấy output/user_result.m3u"
            exit 1
          fi

          python3 <<'PY'
          from pathlib import Path
          import re

          def clean_name(text):
              t = text.lower()
              t = re.sub(r'[\(\[].*?[\)\]]', '', t)
              t = re.sub(r'(?i)\b(fhd|hd|sd|4k|1080p|720p|2k)\b', '', t)
              t = re.sub(r'[^a-z0-9\+\-\s]', '', t)
              t = re.sub(r'\s+', ' ', t).strip()
              return t

          ordered_groups = []
          group_map = {}
          demo_path = Path("config/user_demo.txt")

          if demo_path.exists():
              with open(demo_path, "r", encoding="utf-8", errors="ignore") as f:
                  current_group = "Kênh Khác"
                  for line in f:
                      line = line.strip()
                      if not line: continue
                      if line.endswith("#genre#"):
                          current_group = line.replace(",#genre#", "").strip()
                          if current_group not in ordered_groups:
                              ordered_groups.append(current_group)
                      else:
                          norm = clean_name(line)
                          if norm and norm not in group_map:
                              group_map[norm] = current_group

          sorted_keywords = sorted(group_map.keys(), key=len, reverse=True)

          path = Path("output/user_result.m3u")
          text = path.read_text(encoding="utf-8", errors="ignore")
          text = text.replace("$订阅源", "")
          lines = text.splitlines()

          grouped_output = {grp: [] for grp in ordered_groups}
          seen_urls = set()

          start_idx = 1 if (lines and lines[0].startswith("#EXTM3U")) else 0

          current_extinf = None
          for i in range(start_idx, len(lines)):
              line = lines[i].strip()
              if not line: continue
              
              if line.startswith("#EXTINF"):
                  current_extinf = line
              else:
                  if current_extinf:
                      url = line
                      if "更新时间" in current_extinf or "Thời Gian Cập Nhật" in current_extinf:
                          current_extinf = None
                          continue

                      if url in seen_urls:
                          current_extinf = None
                          continue
                      
                      parts = current_extinf.split(",")
                      raw_channel_name = parts[-1].strip() if len(parts) > 1 else ""
                      
                      if re.match(r'^\d{4}-\d{2}-\d{2}', raw_channel_name):
                          match_id = re.search(r'tvg-id="([^"]*)"', current_extinf)
                          raw_channel_name = match_id.group(1) if match_id else raw_channel_name
                      
                      display_name = re.sub(r'[\u4e00-\u9fff]', '', raw_channel_name)
                      display_name = re.sub(r'\(\s*\)', '', display_name)
                      display_name = re.sub(r'^[-_|\s]+|[-_|\s]+$', '', display_name).strip()
                      if not display_name: display_name = raw_channel_name
                          
                      norm_m3u = clean_name(display_name)
                      
                      matched_group = None
                      for kw in sorted_keywords:
                          if norm_m3u == kw or norm_m3u.startswith(kw + " ") or norm_m3u.startswith(kw + "-") or f" {kw} " in f" {norm_m3u} ":
                              matched_group = group_map[kw]
                              break
                      
                      if matched_group:
                          seen_urls.add(url)
                          base_info = parts[0]
                          if 'group-title="' in base_info:
                              base_info = re.sub(r'group-title="[^"]*"', f'group-title="{matched_group}"', base_info)
                          else:
                              base_info = base_info.replace("#EXTINF:-1", f'#EXTINF:-1 group-title="{matched_group}"', 1)
                          
                          grouped_output[matched_group].append((f"{base_info},{display_name}", url))
                      
                      current_extinf = None

          output_lines = ['#EXTM3U']
          total_channels = 0

          for grp in ordered_groups:
              for extinf, url in grouped_output[grp]:
                  output_lines.append(extinf)
                  output_lines.append(url)
                  total_channels += 1

          path.write_text("\n".join(output_lines) + "\n", encoding="utf-8")

          print(f"\n{'='*60}")
          print(f"✅ TONG SO KENH SONG THU DUOC: {total_channels}")
          print(f"{'='*60}")
          print("THU TU HIEN THI CAC NHOM:")
          for idx, grp in enumerate(ordered_groups, 1):
              count = len(grouped_output[grp])
              print(f"  {idx:02d}. [{count:>4} kenh] - {grp}")
          print(f"{'='*60}\n")
          PY

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Fixed YAML Syntax Error and enforced demo logic"
            git push --force
          fi
