name: 'Update schedule'

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Set branch name
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Update IPTV playlist
        run: pipenv run dev

      - name: 'Create Strict Template Filter Script'
        run: |
          cat << 'PYEOF' > filter.py
          import re
          from pathlib import Path
          import sys

          m3u_file_path = sys.argv[1] if len(sys.argv) > 1 else ""
          if not m3u_file_path or not Path(m3u_file_path).exists():
              sys.exit(0)

          def clean_text_for_match(text):
              if not text: return ""
              t = str(text)
              # Xóa cụm trong ngoặc (Ví dụ: [Geo-blocked], (1080p))
              t = re.sub(r'[\(\[【].*?[\)\]】]', '', t)
              # Xóa chữ Trung Quốc
              t = re.sub(r'[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u3000-\u303f\uff00-\uffef]', '', t)
              # Xóa các tag chất lượng để dễ so khớp (VTV1 HD 1080p -> VTV1 HD)
              t = re.sub(r'(?i)\b(fhd|1080p|720p|2k|4k|8k|uhd|hevc|h264|h265|live|backup|du phong|test|vn|vietnam)\b', '', t)
              # Chỉ giữ lại chữ, số, dấu +, dấu - (Bảo toàn K+ và CCTV-1)
              t = re.sub(r'[^\w\s\+\-]', '', t)
              t = re.sub(r'\s+', ' ', t).strip().lower()
              # Chuẩn hóa khoảng trắng bị sai (VTV 1 -> VTV1, K+ 1 -> K+1)
              t = re.sub(r'\b(vtv|htv|sctv|vtvcab|k\+)\s+(\d+)\b', r'\1\2', t)
              return t

          # ==========================================
          # 1. ĐỌC FILE DEMO LÀM KHUÔN ĐÚC (TEMPLATE DRIVEN)
          # ==========================================
          demo_path = Path("config/user_demo.txt")
          group_order = []
          demo_structure = {}

          if demo_path.exists():
              current_group = None
              with open(demo_path, "r", encoding="utf-8", errors="ignore") as f:
                  for line in f:
                      line = line.strip()
                      if not line: continue
                      if line.endswith("#genre#"):
                          current_group = line.replace(",#genre#", "").strip()
                          if current_group not in group_order:
                              group_order.append(current_group)
                              demo_structure[current_group] = []
                      elif current_group:
                          # Lấy chính xác tên kênh, không trùng lặp trong list demo
                          if line not in demo_structure[current_group]:
                              demo_structure[current_group].append(line)

          # Tạo bản đồ tìm kiếm thông minh (Quét tên dài trước, ngắn sau)
          search_map = []
          for grp in group_order:
              for ch in demo_structure[grp]:
                  clean_name = clean_text_for_match(ch)
                  if clean_name:
                      search_map.append({
                          'clean': clean_name,
                          'original': ch,
                          'group': grp
                      })
          search_map.sort(key=lambda x: len(x['clean']), reverse=True)

          # ==========================================
          # 2. QUÉT FILE M3U (LUẬT 1:1 - LẤY 1 LINK NHANH NHẤT)
          # ==========================================
          m3u_path = Path(m3u_file_path)
          lines = m3u_path.read_text(encoding="utf-8", errors="ignore").splitlines()

          # Khởi tạo rổ chứa kết quả (Bám sát 100% cấu trúc demo, giá trị ban đầu là None)
          results = {grp: {ch: None for ch in demo_structure[grp]} for grp in group_order}
          seen_urls = set()

          current_extinf = None
          for line in lines:
              line = line.strip()
              if not line: continue
              if line.startswith("#EXTM3U"): continue
              
              if line.startswith("#EXTINF"):
                  current_extinf = line
              elif current_extinf:
                  url = line
                  # Bỏ qua dòng thông báo hệ thống và link trùng lặp
                  if "更新时间" in current_extinf or url in seen_urls:
                      current_extinf = None
                      continue
                  
                  parts = current_extinf.split(",")
                  raw_name = parts[-1].strip() if len(parts) > 1 else ""
                  
                  # Sửa lỗi lấy nhầm ID ngày giờ
                  if re.match(r'^\d{4}-\d{2}-\d{2}', raw_name):
                      m = re.search(r'tvg-id="([^"]*)"', current_extinf)
                      if m: raw_name = m.group(1)
                  
                  clean_m3u = clean_text_for_match(raw_name)
                  
                  # TÌM KIẾM THEO DANH SÁCH DEMO
                  for item in search_map:
                      # Dùng Regex (?:\s|-|$) để đảm bảo khớp ranh giới từ vựng an toàn (ví dụ: VTV1 sẽ không nhận vơ VTV10)
                      pattern = r'^' + re.escape(item['clean']) + r'(?:\s|-|$)'
                      if re.match(pattern, clean_m3u):
                          # 🛑 LUẬT 1:1 TẠI ĐÂY: Nếu slot kênh này vẫn đang trống (None), ta điền link vào. Nếu đã có link rồi, bỏ qua!
                          if results[item['group']][item['original']] is None:
                              results[item['group']][item['original']] = (current_extinf, url)
                              seen_urls.add(url)
                          break
                  
                  current_extinf = None

          # ==========================================
          # 3. XUẤT FILE M3U (CHUẨN FORM, CHUẨN THỨ TỰ)
          # ==========================================
          output_lines = ["#EXTM3U"]
          total = 0

          # Vòng lặp ép file xuất ra đi theo ĐÚNG THỨ TỰ nhóm -> kênh của Demo
          for grp in group_order:
              for ch in demo_structure[grp]:
                  data = results[grp][ch]
                  if data is not None:
                      extinf, url = data
                      base = extinf.split(",")[0]
                      
                      # Ép```

