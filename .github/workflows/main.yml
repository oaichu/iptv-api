name: 'Update schedule'

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Set branch name
        run: echo "BRANCH_NAME=${{ github.repository_owner == 'Guovin' && 'gd' || 'master' }}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pipenv'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install pipenv
        run: pip3 install --user pipenv

      - name: Install dependencies
        run: pipenv --python 3.13 && pipenv install --deploy

      - name: Update IPTV playlist
        run: pipenv run dev

      - name: Create Ultimate Anti-Duplicate Script
        run: |
          cat << 'PYEOF' > filter.py
          import re
          from pathlib import Path
          import sys

          m3u_file_path = sys.argv[1] if len(sys.argv) > 1 else ""
          if not m3u_file_path or not Path(m3u_file_path).exists():
              sys.exit(0)

          def remove_chinese(text):
              return re.sub(r'[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff\u3000-\u303f\uff00-\uffef]', '', text).strip()

          def clean_name(text):
              if not text: return ""
              t = text.lower().strip()
              t = re.sub(r'[\(\[【].*?[\)\]】]', '', t)
              t = re.sub(r'(?i)\b(fhd|hd|sd|4k|8k|1080p|720p|2k|uhd|hdr|hevc|h264|h265|live|backup|du phong|dự phòng|test|ipv6|ipv4|vietnam|vn)\b', '', t)
              t = remove_chinese(t)
              t = re.sub(r'[^\w\s\+\-]', '', t, flags=re.UNICODE)
              t = re.sub(r'([a-z])\s+(\d)', r'\1\2', t)
              t = re.sub(r'(\d)\s+([a-z])', r'\1\2', t)
              t = re.sub(r'\s+', ' ', t).strip('+- ')
              return t.strip()

          demo_path = Path("config/user_demo.txt")
          groups_order, channels_in_group, current_group = [], {}, None
          if demo_path.exists():
              with open(demo_path, "r", encoding="utf-8", errors="ignore") as f:
                  for line in f:
                      line = line.strip()
                      if not line: continue
                      if line.endswith("#genre#"):
                          current_group = line.replace(",#genre#", "").strip()
                          if current_group not in groups_order:
                              groups_order.append(current_group)
                              channels_in_group[current_group] = []
                      elif current_group: channels_in_group[current_group].append(line)

          position_map = {}
          for grp in groups_order:
              for idx, ch_name in enumerate(channels_in_group[grp]):
                  clean = clean_name(ch_name)
                  if clean and clean not in position_map: position_map[clean] = (grp, idx, ch_name)

          m3u_path = Path(m3u_file_path)
          lines = m3u_path.read_text(encoding="utf-8", errors="ignore").replace("$订阅源", "").splitlines()
          
          grouped = {grp: [] for grp in groups_order}
          global_seen_channels = set()  # 🛑 KHUÔN LỌC CHỐNG LẶP THEO TÊN KÊNH DEMO GIỮ DUY NHẤT 1 LINK
          
          current_extinf = None
          for line in lines[1:] if lines and lines[0].startswith("#EXTM3U") else lines:
              line = line.strip()
              if not line: continue
              if line.startswith("#EXTINF"): current_extinf = line
              elif current_extinf:
                  url = line
                  if "更新时间" in current_extinf or "Thời Gian Cập Nhật" in current_extinf:
                      current_extinf = None
                      continue
                      
                  parts = current_extinf.split(",")
                  raw_name = parts[-1].strip() if len(parts) > 1 else ""
                  if re.match(r'^\d{4}-\d{2}-\d{2}', raw_name):
                      m = re.search(r'tvg-id="([^"]*)"', current_extinf)
                      raw_name = m.group(1) if m else raw_name
                  
                  display_name = remove_chinese(raw_name).strip()
                  if not display_name: display_name = raw_name
                  clean_display = clean_name(display_name)
                  
                  matched_grp, matched_idx, matched_demo_name = None, None, None
                  
                  if clean_display in position_map:
                      matched_grp, matched_idx, matched_demo_name = position_map[clean_display]
                  else:
                      for dc in sorted(position_map.keys(), key=len, reverse=True):
                          if len(dc) >= 2:
                              if clean_display == dc or clean_display.startswith(dc + " ") or clean_display.startswith(dc + "-") or f" {dc} " in f" {clean_display} ":
                                  matched_grp, matched_idx, matched_demo_name = position_map[dc]
                                  break
                  
                  if matched_grp and matched_demo_name:
                      # 🛑 CHỈ CHO PHÉP 1 CƠ HỘI DUY NHẤT CHO MỖI TÊN KÊNH DEMO
                      if matched_demo_name not in global_seen_channels:
                          global_seen_channels.add(matched_demo_name)
                          
                          base_info = parts[0]
                          if 'group-title="' in base_info: base_info = re.sub(r'group-title="[^"]*"', f'group-title="{matched_grp}"', base_info)
                          else: base_info = base_info.replace("#EXTINF:-1", f'#EXTINF:-1 group-title="{matched_grp}"', 1)
                          
                          # Ép tên hiển thị ra file M3U trùng khớp hoàn toàn với chữ ông viết ở file Demo
                          grouped[matched_grp].append((matched_idx, f"{base_info},{matched_demo_name}", url))
                  current_extinf = None

          output_lines, total = ['#EXTM3U'], 0
          for grp in groups_order:
              # Sắp xếp lại theo đúng số thứ tự (index) xuất hiện trong hàng của demo
              for idx, ext, url in sorted(grouped[grp], key=lambda x: x[0]):
                  output_lines.extend([ext, url])
                  total += 1

          Path("output/user_result.m3u").write_text("\n".join(output_lines) + "\n", encoding="utf-8")
          print(f"TONG SO KENH SẠCH KHÔNG TRÙNG: {total}")
          PYEOF

      - name: Run Filter
        run: |
          if [ -f output/user_result.m3u ]; then
            python3 filter.py output/user_result.m3u
          elif [ -f output/result.m3u ]; then
            cp output/result.m3u output/user_result.m3u
            python3 filter.py output/user_result.m3u
          fi

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Strict 1 link per demo channel template and matching sequence"
            git push --force
          fi
