[Settings]

source_file = config/user_demo.txt
final_file = output/user_result.txt

# Bật tất cả nguồn
open_local = True
open_subscribe = True
open_hotel = True
open_multicast = True
open_online_search = True

# Tăng số lượng tìm kiếm
urls_limit = 15
hotel_num = 30
multicast_num = 20
subscribe_num = 20

# Quan trọng: Giảm tiêu chuẩn để có kết quả
open_speed_test = True
min_speed = 0.1
timeout = 12

# Bật cơ chế bù (rất quan trọng để tránh output trống)
open_supply = True

# Bật các tùy chọn linh hoạt
open_filter_resolution = False
open_unmatch_category = True
open_empty_category = True

open_update_time = True
open_m3u_result = True
open_epg = True
open_url_info = True

language = vi_VN
update_time_position = top
open_sort = True
sort_method = speed
