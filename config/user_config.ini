[Settings]
source_file = config/user_demo.txt
final_file = output/user_result.txt

# Bật đầy đủ nguồn tìm kiếm
open_local = True
open_subscribe = True
open_hotel = True
open_multicast = True
open_online_search = True

# Tăng mạnh số link dự phòng và số lượng nguồn
urls_limit = 10
hotel_num = 50
multicast_num = 50
subscribe_num = 50

# Nới lỏng bộ lọc tốc độ để cứu nhiều kênh hơn
open_speed_test = True
min_speed = 0.05          # Hạ xuống 0.05 MB/s (rất thấp để quét được nhiều kênh chậm)
timeout = 15              # Tăng thời gian chờ lên 15 giây

# Bù nguồn để tối ưu
open_supply = True

# GIỮ NGUYÊN các khóa chặn kênh rác
open_filter_resolution = False
open_unmatch_category = False
open_empty_category = False

open_update_time = True
open_m3u_result = True
open_epg = True
open_url_info = True

language = vi_VN
update_time_position = top
open_sort = True
sort_method = speed
