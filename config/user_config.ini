final_file = output/user_result.txt

open_update = True
open_local = True
open_subscribe = True
open_hotel = True
open_multicast = True
open_online_search = True
open_request = True
open_use_cache = True
open_history = True
open_supply = True

# Tăng giới hạn quét nguồn để thu về càng nhiều link dự phòng càng tốt
urls_limit = 40
hotel_num = 150
multicast_num = 150
subscribe_num = 400
online_search_num = 150

open_speed_test = True
open_filter_speed = False
min_speed = 0.01
timeout = 30

# BẮT BUỘC ĐỂ TRUE: Thu thập toàn bộ luồng rác/lệch chuẩn về làm "đạn" cho Python xử lý
