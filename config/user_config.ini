[Settings]
source_file = config/user_demo.txt
final_file = output/user_result.txt

# Bật lại các nguồn tìm kiếm để tăng tối đa khả năng dò kênh
open_local = True
open_subscribe = True
open_hotel = True
open_multicast = True
open_online_search = True

# Tăng số lượng link dự phòng lên 5 link cho mỗi kênh
urls_limit = 5
hotel_num = 20
multicast_num = 20
subscribe_num = 20

# 🟢 NỚI LỎNG BỘ LỌC ĐỂ CỨU KÊNH:
open_speed_test = True
# Hạ tốc độ tối thiểu xuống 0.1 MB/s (mạng TVBox ở nhà kéo luồng này vẫn chạy ngon)
min_speed = 0.1
# Tăng thời gian chờ lên 9 giây để máy chủ GitHub kịp kết nối về luồng VN/TQ
timeout = 9

# Bật cơ chế bù nguồn để tối ưu tìm kiếm
open_supply = True

# 🔒 GIỮ NGUYÊN KHÓA CHẶN KÊNH RÁC TIẾNG TRUNG:
# Tắt lọc độ phân giải nâng cao để tránh sót kênh
open_filter_resolution = False
# TUYỆT ĐỐI GIỮ FALSE để không cho nhóm 611 kênh rác quay trở lại
open_unmatch_category = False
# Tắt các nhóm trống
open_empty_category = False

open_update_time = True
open_m3u_result = True
open_epg = True
open_url_info = True

language = vi_VN
update_time_position = top
open_sort = True
sort_method = speed
