[Settings]
source_file = config/user_demo.txt
final_file = output/user_result.txt

# Bật nguồn tìm kiếm online và link đăng ký sạch
open_local = True
open_subscribe = True
open_hotel = False
open_multicast = False
open_online_search = True

# Thiết lập giới hạn: Mỗi kênh chỉ lấy tối đa 3 link tốt nhất
urls_limit = 3
hotel_num = 10
multicast_num = 10
subscribe_num = 10

# 🔥 THIẾT QUÂN LUẬT DIỆT KÊNH LỖI (IPTV Smarters sẽ không bị đứng hình):
open_speed_test = True
# Tốc độ tối thiểu phải đạt 0.5 MB/s mới giữ lại
min_speed = 0.5
# Quá 4 giây không phản hồi => XÓA THẲNG TAY
timeout = 4

# Tắt chế độ bù nguồn rác để tránh lấy link fake, link die
open_supply = False

# 🔥 THIẾT QUÂN LUẬT XÓA SỔ NHÓM TIẾNG TRUNG RÁC:
open_filter_resolution = True
# TẮT mục này để HỦY BỎ hoàn toàn cái nhóm 611 kênh Vô Danh (未匹配频道)
open_unmatch_category = False
# TẮT các nhóm trống không có kênh sống
open_empty_category = False

open_update_time = True
open_m3u_result = True
open_epg = True
open_url_info = True

language = vi_VN
update_time_position = top
open_sort = True
sort_method = speed
