[Settings]

# =========================
# Cấu hình chính cho người Việt
# =========================

# File template (sử dụng file user_demo.txt bạn vừa tạo)
source_file = config/user_demo.txt

# File kết quả đầu ra
final_file = output/user_result.txt

# Bật các nguồn thu thập
open_local = True
open_subscribe = True
open_hotel = True
open_multicast = True
open_online_search = True

# Số lượng link mỗi kênh (tăng để có nhiều lựa chọn hơn)
urls_limit = 12

# Số lượng từ các nguồn khác
hotel_num = 25
multicast_num = 20
subscribe_num = 15

# Tùy chọn đo tốc độ
open_speed_test = True
min_speed = 0.3          ; MB/s (giảm xuống để dễ ra kết quả hơn)
timeout = 8

# Lọc chất lượng
open_filter_resolution = True
min_resolution = 720x480

# Các tùy chọn khác
open_update_time = True
open_url_info = True
open_m3u_result = True
open_epg = True
language = zh_CN
update_time_position = top

# Tăng hiệu suất tìm kiếm
open_sort = True
sort_method = speed

# CDN (nếu bạn có link CDN từ Guovin thì paste vào đây)
# cdn_url = https://your-cdn-link.com
