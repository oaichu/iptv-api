[Setting]
# Đường dẫn file danh sách kênh gốc để làm mồi cào dữ liệu
source_file = config/demo.txt

# Định dạng file xuất ra (Nên chọn m3u để ăn khớp với mọi loại TVBox/App hiện tại)
output_type = m3u

# Số lượng link dự phòng tốt nhất giữ lại cho mỗi kênh (Để từ 3 - 5 link là vừa đẹp)
urls_limit = 3

# Giới hạn thời gian phản hồi của luồng phát (Giây). Thằng nào phản hồi > 3s sẽ bị loại bỏ để tránh giật hình
timeout = 3

# Số lượng luồng test tốc độ chạy đồng thời trên GitHub server. 
# Để 20-30 là tối ưu, không sợ bị các server đài chặn IP (Rate limit)
thread_limit = 20

# Tiêu chí sắp xếp link: "speed" (Thằng nào tải nhanh nhất xếp lên đầu)
sort_type = speed

# Tự động đi cào, quét thêm các nguồn IPTV public khác trên internet
open_source = True

# Lọc chất lượng video. Chỉ giữ lại luồng chuẩn nét cao, tự động loại bỏ các luồng 480p, SD nát hình
resolution_filter = 4k,1080p,HD

# Chế độ chạy: "open" để mở rộng tìm kiếm toàn mạng
mode = open
